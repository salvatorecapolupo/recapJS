<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Quicklab — TPSIT 5EL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #111520;
    --border: #1e2740;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #a0f080;
    --text: #d0dcea;
    --dim: #5a6a80;
    --code-bg: #080b12;
    --run: #00e5ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    min-height: 100vh;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 28px;
    background: var(--panel);
    border-bottom: 2px solid var(--accent);
    height: 56px;
  }
  header .title {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  header .subtitle {
    font-size: 1rem;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* NAV DOTS */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .dot:hover { border-color: var(--accent); color: var(--accent); }
  .dot.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* MAIN LAYOUT */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: calc(100vh - 56px);
  }

  /* LEFT: code panel */
  .code-panel {
    display: flex;
    flex-direction: column;
    border-right: 2px solid var(--border);
  }

  .slide-header {
    padding: 14px 24px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .slide-number {
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .slide-title {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
  }
  .slide-desc {
    font-size: 1.05rem;
    color: var(--accent3);
    margin-top: 4px;
    font-style: italic;
  }

  .editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    gap: 10px;
  }

  .editor-label {
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  textarea#editor {
    flex: 1;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    padding: 14px;
    resize: none;
    outline: none;
    line-height: 1.65;
    tab-size: 2;
    transition: border-color 0.2s;
  }
  textarea#editor:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn-run {
    background: var(--accent);
    color: #000;
    flex: 1;
  }
  .btn-run:hover { background: #33ecff; transform: translateY(-1px); }
  .btn-run:active { transform: translateY(0); }

  .btn-reset {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  /* RIGHT: preview panel */
  .preview-panel {
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .preview-label {
    padding: 8px 20px;
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-label .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  iframe#preview {
    flex: 1;
    border: none;
    background: #fff;
  }

  /* ARROWS */
  .arrow-nav {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    justify-content: flex-end;
  }

  .btn-arrow {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn-arrow:hover { border-color: var(--accent); color: var(--accent); }
  .btn-arrow:disabled { opacity: 0.2; cursor: default; }
  .btn-arrow:disabled:hover { border-color: var(--border); color: var(--text); }

  /* CATEGORIA badge */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .badge-dom    { background:#1a2535; color: var(--accent); border:1px solid var(--accent); }
  .badge-style  { background:#251525; color: #e060e0; border:1px solid #e060e0; }
  .badge-array  { background:#152520; color: var(--accent3); border:1px solid var(--accent3); }
  .badge-async  { background:#252015; color: #ffd060; border:1px solid #ffd060; }
  .badge-fetch  { background:#201525; color: var(--accent2); border:1px solid var(--accent2); }
  .badge-logica { background:#152020; color: #60e0c0; border:1px solid #60e0c0; }

</style>
</head>
<body>

<header>
  <div>
    <div class="title">JS Quicklab</div>
    <div class="subtitle">TPSIT 5EL — Esercitazioni Rapide DOM/Fetch/Async</div>
  </div>
  <div class="nav-bar" id="navDots"></div>
</header>

<main>
  <!-- LEFT -->
  <div class="code-panel">
    <div class="slide-header">
      <div class="slide-number" id="slideNum"></div>
      <div class="slide-title" id="slideTitle"></div>
      <div class="slide-desc" id="slideDesc"></div>
      <span class="badge" id="slideBadge"></span>
    </div>
    <div class="editor-wrap">
      <div class="editor-label">▸ HTML + JS — modifica e premi ESEGUI</div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div class="btn-row">
        <button class="btn btn-run" onclick="runCode()">▶ Esegui</button>
        <button class="btn btn-reset" onclick="resetCode()">↺ Reset</button>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="preview-panel">
    <div class="preview-label">
      <span class="pulse"></span>
      Preview live
    </div>
    <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
    <div class="arrow-nav">
      <button class="btn-arrow" id="btnPrev" onclick="navigate(-1)">← Prec</button>
      <button class="btn-arrow" id="btnNext" onclick="navigate(1)">Succ →</button>
    </div>
  </div>
</main>

<script>
const slides = [
  {
    title: "Cambio Testo",
    desc: "Al click, cambia il testo da «Offline» a «Online».",
    badge: "DOM", badgeClass: "badge-dom",
    code: `<b id="stato">Offline</b>
<button id="btn">Attiva</button>

<script>
  document.getElementById('btn').onclick = () => {
    document.getElementById('stato').textContent = "Online";
  };
<\/script>`
  },
  {
    title: "Toggle Colore",
    desc: "Al click, alterna il colore del LED tra rosso e verde.",
    badge: "STILI", badgeClass: "badge-style",
    code: `<div id="led" style="background:red; width:40px; height:40px; border-radius:50%;"></div>
<br>
<button id="btn">Cambia Colore</button>

<script>
  document.getElementById('btn').onclick = () => {
    let l = document.getElementById('led');
    l.style.background = (l.style.background === 'red') ? 'green' : 'red';
  };
<\/script>`
  },
  {
    title: "Aggiunta Lista",
    desc: "Aggiungi il valore dell'input alla lista HTML.",
    badge: "DOM", badgeClass: "badge-dom",
    code: `<input id="in" placeholder="Nome host">
<button id="btn">Add</button>
<ul id="lista"></ul>

<script>
  document.getElementById('btn').onclick = () => {
    let val = document.getElementById('in').value;
    document.getElementById('lista').innerHTML += \`<li>\${val}</li>\`;
  };
<\/script>`
  },
  {
    title: "Rimozione DOM",
    desc: "Al click, elimina l'elemento stesso dal DOM.",
    badge: "DOM", badgeClass: "badge-dom",
    code: `<div id="box" style="padding:10px; background:#eee;">
  Router 1
  <button id="btn">✕ Rimuovi</button>
</div>

<script>
  document.getElementById('btn').onclick = () => {
    document.getElementById('box').remove();
  };
<\/script>`
  },
  {
    title: "Async / Await",
    desc: "Attendi 1.5s prima di mostrare «Ping OK».",
    badge: "ASYNC", badgeClass: "badge-async",
    code: `<button id="btn">Ping</button>
<span id="msg" style="margin-left:10px;"></span>

<script>
  document.getElementById('btn').onclick = async () => {
    document.getElementById('msg').textContent = "Attesa...";
    await new Promise(r => setTimeout(r, 1500));
    document.getElementById('msg').textContent = "Ping OK ✓";
  };
<\/script>`
  },
  {
    title: "Logica IP",
    desc: "Verifica se l'ultimo byte è Broadcast (255), Network (0) o Host.",
    badge: "LOGICA", badgeClass: "badge-logica",
    code: `IP: 10.0.0.<input id="ip" type="number" min="0" max="255" style="width:60px;">
<button id="btn">Check</button>
<p id="out"></p>

<script>
  document.getElementById('btn').onclick = () => {
    let v = parseInt(document.getElementById('ip').value);
    let msg = v === 255 ? "📢 Broadcast"
            : v === 0   ? "🌐 Network"
            : (v > 0 && v < 255) ? "🖥️ Host valido"
            : "❌ Errore";
    document.getElementById('out').textContent = msg;
  };
<\/script>`
  },
  {
    title: "Render Array",
    desc: "Popola dinamicamente una lista leggendo da un array.",
    badge: "ARRAY", badgeClass: "badge-array",
    code: `<ul id="lista"></ul>

<script>
  const hosts = ["PC1", "PC2", "Server", "Router-Core"];
  hosts.forEach(h => {
    document.getElementById('lista').innerHTML += \`<li>\${h}</li>\`;
  });
<\/script>`
  },
  {
    title: "Fetch GET",
    desc: "Scarica un JSON e mostra il titolo del primo post.",
    badge: "FETCH", badgeClass: "badge-fetch",
    code: `<button id="btn">Scarica Post</button>
<p id="out" style="margin-top:10px;"></p>

<script>
  document.getElementById('btn').onclick = async () => {
    document.getElementById('out').textContent = "Caricamento...";
    let res = await fetch('https://jsonplaceholder.typicode.com/posts/1');
    let data = await res.json();
    document.getElementById('out').textContent = data.title;
  };
<\/script>`
  },
  {
    title: "Fetch POST",
    desc: "Invia dati JSON al server con il metodo POST.",
    badge: "FETCH", badgeClass: "badge-fetch",
    code: `<button id="btn">Invia Stato</button>
<p id="out"></p>

<script>
  document.getElementById('btn').onclick = async () => {
    let res = await fetch('https://jsonplaceholder.typicode.com/posts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ status: "online", device: "router-1" })
    });
    let data = await res.json();
    document.getElementById('out').textContent = "Risposta ID: " + data.id + " ✓";
  };
<\/script>`
  },
  {
    title: "Latenza Media",
    desc: "Calcola la latenza media da un array e mostrala.",
    badge: "ARRAY", badgeClass: "badge-array",
    code: `<p>Ping registrati: <span id="pings"></span></p>
<p>Media: <b id="media"></b> ms</p>

<script>
  const ping = [10, 20, 30, 45, 5];
  document.getElementById('pings').textContent = ping.join(', ');
  let sum = 0;
  ping.forEach(p => sum += p);
  document.getElementById('media').textContent = (sum / ping.length).toFixed(1);
<\/script>`
  }
];

let current = 0;
const originals = slides.map(s => s.code);

function buildDots() {
  const nav = document.getElementById('navDots');
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot';
    d.textContent = i + 1;
    d.onclick = () => goTo(i);
    nav.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function goTo(idx) {
  current = idx;
  const s = slides[current];
  document.getElementById('slideNum').textContent = `Variante ${current + 1} / ${slides.length}`;
  document.getElementById('slideTitle').textContent = s.title;
  document.getElementById('slideDesc').textContent = s.desc;
  const badge = document.getElementById('slideBadge');
  badge.textContent = s.badge;
  badge.className = 'badge ' + s.badgeClass;
  document.getElementById('editor').value = s.code;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === slides.length - 1;
  updateDots();
  runCode();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < slides.length) goTo(next);
}

function runCode() {
  const code = document.getElementById('editor').value;
  const iframe = document.getElementById('preview');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head>
    <style>
      body { font-family: system-ui, sans-serif; padding: 28px; font-size: 16px; }
      button { padding: 8px 18px; font-size: 15px; cursor: pointer; margin: 4px; border-radius: 4px; border: 1px solid #999; background: #f0f0f0; }
      button:hover { background: #ddd; }
      input { padding: 6px 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; }
      ul { margin-top: 8px; padding-left: 20px; }
      li { margin: 4px 0; }
      p, b, span { font-size: 16px; }
    </style>
  </head><body>${code}</body></html>`);
  doc.close();
}

function resetCode() {
  slides[current].code = originals[current];
  document.getElementById('editor').value = originals[current];
  runCode();
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
  if (e.key === 'Enter') runCode();
});

buildDots();
goTo(0);
</script>
</body>
</html>
